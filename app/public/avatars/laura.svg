<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <radialGradient id="bgL" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#003BDF"/>
      <stop offset="100%" stop-color="#001654"/>
    </radialGradient>
    <radialGradient id="skinL" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#FDDBB4"/>
      <stop offset="100%" stop-color="#F0BC8C"/>
    </radialGradient>
    <radialGradient id="glowL" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06E5EC" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#06E5EC" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="circleL">
      <circle cx="60" cy="60" r="60"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="60" cy="60" r="60" fill="url(#bgL)"/>
  <!-- Glow -->
  <circle cx="60" cy="60" r="60" fill="url(#glowL)"/>

  <!-- Shoulders / body -->
  <ellipse cx="60" cy="105" rx="34" ry="22" fill="#0a1a5c"/>
  <!-- Collar/top -->
  <path d="M42 92 Q60 100 78 92 L78 105 Q60 115 42 105 Z" fill="#003BDF"/>

  <!-- Neck -->
  <rect x="53" y="76" width="14" height="18" rx="6" fill="url(#skinL)"/>

  <!-- Head -->
  <ellipse cx="60" cy="62" rx="22" ry="24" fill="url(#skinL)"/>

  <!-- Hair — professional style, dark brown with subtle highlight -->
  <ellipse cx="60" cy="44" rx="22" ry="13" fill="#3D2314"/>
  <path d="M38 51 Q38 38 60 36 Q82 38 82 51 Q80 42 60 40 Q40 42 38 51Z" fill="#2A1608"/>
  <!-- Side hair strands -->
  <path d="M38 51 Q35 60 37 68 Q40 58 40 51Z" fill="#3D2314"/>
  <path d="M82 51 Q85 60 83 68 Q80 58 80 51Z" fill="#3D2314"/>

  <!-- Eyes -->
  <ellipse cx="51" cy="62" rx="4" ry="3.5" fill="white"/>
  <ellipse cx="69" cy="62" rx="4" ry="3.5" fill="white"/>
  <circle cx="52" cy="62" r="2.5" fill="#2A4DD0"/>
  <circle cx="70" cy="62" r="2.5" fill="#2A4DD0"/>
  <circle cx="52.8" cy="61.2" r="0.8" fill="white"/>
  <circle cx="70.8" cy="61.2" r="0.8" fill="white"/>
  <!-- Eyebrows -->
  <path d="M47 57.5 Q51 56 55 57.5" stroke="#3D2314" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M65 57.5 Q69 56 73 57.5" stroke="#3D2314" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Nose -->
  <path d="M60 65 Q58 70 60 71 Q62 70 60 65" stroke="#D4956A" stroke-width="1" fill="none" stroke-linecap="round"/>

  <!-- Smile -->
  <path d="M53 75 Q60 79 67 75" stroke="#C07A55" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Small earrings -->
  <circle cx="38" cy="65" r="2" fill="#06E5EC" opacity="0.9"/>
  <circle cx="82" cy="65" r="2" fill="#06E5EC" opacity="0.9"/>

  <!-- Cyan glow ring -->
  <circle cx="60" cy="60" r="59" fill="none" stroke="#06E5EC" stroke-width="1.5" opacity="0.6"/>
  <circle cx="60" cy="60" r="57" fill="none" stroke="#06E5EC" stroke-width="0.5" opacity="0.3"/>
</svg>
