name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write .env
        env:
          GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: *** secrets.GOOGLE_CLIENT_SECRET }}
          ALLOWED_DOMAIN: ${{ vars.ALLOWED_DOMAIN }}
          ALLOWED_EMAILS: ${{ vars.ALLOWED_EMAILS }}
          ANTHROPIC_ADMIN_API_KEY: *** secrets.ANTHROPIC_ADMIN_API_KEY }}
          ANTHROPIC_API_KEY: *** secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_AGENT_API_KEY_ID: ${{ vars.ANTHROPIC_AGENT_API_KEY_ID }}
          HUBSPOT_TOKEN: *** secrets.HUBSPOT_TOKEN }}
          PORT: ${{ vars.PORT }}
          BB_AGENTS_HOST: ${{ vars.BB_AGENTS_HOST }}
          BB_AGENTS_DB: ${{ vars.BB_AGENTS_DB }}
          BB_AGENTS_USER: ${{ vars.BB_AGENTS_USER }}
          BB_AGENTS_PASSWORD: *** secrets.BB_AGENTS_PASSWORD }}
          PG_HOST: ${{ vars.PG_HOST }}
          PG_USER: ${{ vars.PG_USER }}
          PG_PASSWORD: *** secrets.PG_PASSWORD }}
          PG_DATABASE: ${{ vars.PG_DATABASE }}
          AGENT_SECRET: *** secrets.AGENT_SECRET }}
          OPENCLAW_GATEWAY_TOKEN: *** secrets.OPENCLAW_GATEWAY_TOKEN }}
        run: |
          {
            echo "GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}"
            echo "GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}"
            echo "ALLOWED_DOMAIN=${ALLOWED_DOMAIN}"
            echo "ALLOWED_EMAILS=${ALLOWED_EMAILS}"
            echo "ANTHROPIC_ADMIN_API_KEY=${ANTHROPIC_ADMIN_API_KEY}"
            echo "ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}"
            echo "ANTHROPIC_AGENT_API_KEY_ID=${ANTHROPIC_AGENT_API_KEY_ID}"
            echo "HUBSPOT_TOKEN=${HUBSPOT_TOKEN}"
            echo "PORT=${PORT}"
            echo "BB_AGENTS_HOST=${BB_AGENTS_HOST}"
            echo "BB_AGENTS_DB=${BB_AGENTS_DB}"
            echo "BB_AGENTS_USER=${BB_AGENTS_USER}"
            echo "BB_AGENTS_PASSWORD=${BB_AGENTS_PASSWORD}"
            echo "PG_HOST=${PG_HOST}"
            echo "PG_PORT=5432"
            echo "PG_USER=${PG_USER}"
            echo "PG_PASSWORD=${PG_PASSWORD}"
            echo "PG_DATABASE=${PG_DATABASE}"
            echo "AGENT_SECRET=${AGENT_SECRET}"
            echo "OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}"
            echo "LAURA_AGENT_ID=laura-abhi-agent"
          } > /var/www/laura-dashboard/api/.env

      - name: Install API dependencies
        run: |
          cd /var/www/laura-dashboard/api
          npm install --omit=dev --silent

      - name: Build frontend
        run: |
          cd /var/www/laura-dashboard/app
          npm install --silent
          npm run build

      - name: Copy build to web root
        run: |
          cp -r /var/www/laura-dashboard/app/dist/* /var/www/laura-dashboard/

      - name: Restart API
        run: |
          pkill -f "node server.js" || true
          sleep 1
          cd /var/www/laura-dashboard/api
          nohup node server.js >> /tmp/laura-api.log 2>&1 &
          sleep 4
          curl -sf http://127.0.0.1:3100/api/health > /dev/null && echo "✅ API healthy" || echo "⚠️ health check failed"
