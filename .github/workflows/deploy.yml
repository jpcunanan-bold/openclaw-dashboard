name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ vars.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Write .env and deploy
        env:
          EC2_HOST: ${{ vars.EC2_HOST }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          ALLOWED_DOMAIN: ${{ vars.ALLOWED_DOMAIN }}
          ALLOWED_EMAILS: ${{ vars.ALLOWED_EMAILS }}
          ANTHROPIC_ADMIN_API_KEY: ${{ secrets.ANTHROPIC_ADMIN_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_AGENT_API_KEY_ID: ${{ vars.ANTHROPIC_AGENT_API_KEY_ID }}
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
          PORT: ${{ vars.PORT }}
          BB_AGENTS_HOST: ${{ vars.BB_AGENTS_HOST }}
          BB_AGENTS_DB: ${{ vars.BB_AGENTS_DB }}
          BB_AGENTS_USER: ${{ vars.BB_AGENTS_USER }}
          BB_AGENTS_PASSWORD: ${{ secrets.BB_AGENTS_PASSWORD }}
          PG_HOST: ${{ vars.PG_HOST }}
          PG_USER: ${{ vars.PG_USER }}
          PG_PASSWORD: ${{ secrets.PG_PASSWORD }}
          PG_DATABASE: ${{ vars.PG_DATABASE }}
          AGENT_SECRET: ${{ secrets.AGENT_SECRET }}
          OPENCLAW_GATEWAY_TOKEN: ${{ secrets.OPENCLAW_GATEWAY_TOKEN }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ubuntu@$EC2_HOST bash << ENDSSH
            set -e

            echo "=== Writing .env ==="
            cat > /var/www/laura-dashboard/api/.env << 'EOF'
          GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
          GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
          ALLOWED_DOMAIN=${ALLOWED_DOMAIN}
          ALLOWED_EMAILS=${ALLOWED_EMAILS}
          ANTHROPIC_ADMIN_API_KEY=${ANTHROPIC_ADMIN_API_KEY}
          ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
          ANTHROPIC_AGENT_API_KEY_ID=${ANTHROPIC_AGENT_API_KEY_ID}
          HUBSPOT_TOKEN=${HUBSPOT_TOKEN}
          PORT=${PORT}
          BB_AGENTS_HOST=${BB_AGENTS_HOST}
          BB_AGENTS_DB=${BB_AGENTS_DB}
          BB_AGENTS_USER=${BB_AGENTS_USER}
          BB_AGENTS_PASSWORD=${BB_AGENTS_PASSWORD}
          PG_HOST=${PG_HOST}
          PG_PORT=5432
          PG_USER=${PG_USER}
          PG_PASSWORD=${PG_PASSWORD}
          PG_DATABASE=${PG_DATABASE}
          AGENT_SECRET=${AGENT_SECRET}
          OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
          LAURA_AGENT_ID=laura-abhi-agent
          EOF

            echo "=== Pulling latest code ==="
            cd /var/www/laura-dashboard
            git fetch https://${GH_PAT}@github.com/jpcunanan-bold/openclaw-dashboard.git main
            git checkout -B main FETCH_HEAD

            echo "=== Installing API dependencies ==="
            cd /var/www/laura-dashboard/api
            npm install --omit=dev --silent

            echo "=== Building frontend ==="
            cd /var/www/laura-dashboard/app
            npm install --silent
            npm run build

            echo "=== Copying build to web root ==="
            cp -r /var/www/laura-dashboard/app/dist/* /var/www/laura-dashboard/

            echo "=== Restarting API ==="
            pkill -f "node server.js" || true
            sleep 1
            cd /var/www/laura-dashboard/api
            nohup node server.js >> /tmp/laura-api.log 2>&1 &
            sleep 4
            curl -sf http://127.0.0.1:3100/api/health > /dev/null && echo "✅ API healthy" || echo "⚠️ health check failed"

            echo "=== Deploy complete ==="
          ENDSSH
