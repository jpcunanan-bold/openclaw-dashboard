name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync checked-out code into live deploy paths
        # Checkout above only populates the runner's own workspace — nothing past this point
        # reads from it. /var/www/laura-dashboard is a separate, persistent directory that every
        # later step (install/build/restart) operates on directly, so without this sync step the
        # deploy just reinstalls/rebuilds/restarts whatever old code already happens to be sitting
        # there, regardless of what was just pushed.
        run: |
          rsync -a --delete --exclude='.env' --exclude='node_modules' "$GITHUB_WORKSPACE/api/" /var/www/laura-dashboard/api/
          rsync -a --delete --exclude='node_modules' --exclude='dist' --exclude='dist-deploy' "$GITHUB_WORKSPACE/app/" /var/www/laura-dashboard/app/

      - name: Write .env
        env:
          GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          ALLOWED_DOMAIN: ${{ vars.ALLOWED_DOMAIN }}
          ALLOWED_EMAILS: ${{ vars.ALLOWED_EMAILS }}
          ANTHROPIC_ADMIN_API_KEY: ${{ secrets.ANTHROPIC_ADMIN_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_AGENT_API_KEY_ID: ${{ vars.ANTHROPIC_AGENT_API_KEY_ID }}
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
          PORT: ${{ vars.PORT }}
          BB_AGENTS_HOST: ${{ vars.BB_AGENTS_HOST }}
          BB_AGENTS_DB: ${{ vars.BB_AGENTS_DB }}
          BB_AGENTS_USER: ${{ vars.BB_AGENTS_USER }}
          BB_AGENTS_PASSWORD: ${{ secrets.BB_AGENTS_PASSWORD }}
          PG_HOST: ${{ vars.PG_HOST }}
          PG_USER: ${{ vars.PG_USER }}
          PG_PASSWORD: ${{ secrets.PG_PASSWORD }}
          PG_DATABASE: ${{ vars.PG_DATABASE }}
          AGENT_SECRET: ${{ secrets.AGENT_SECRET }}
          OPENCLAW_GATEWAY_TOKEN: ${{ secrets.OPENCLAW_GATEWAY_TOKEN }}
          SMT_HOST: ${{ vars.SMT_HOST }}
          SMT_DATABASE: ${{ vars.SMT_DATABASE }}
          SMT_USER: ${{ vars.SMT_USER }}
          SMT_PASSWORD: ${{ secrets.SMT_PASSWORD }}
          SMT_READONLY_USER: ${{ vars.SMT_READONLY_USER }}
          SMT_READONLY_PASSWORD: ${{ secrets.SMT_READONLY_PASSWORD }}
          SMT_ADMIN_USER: ${{ vars.SMT_ADMIN_USER }}
          SMT_ADMIN_PASSWORD: ${{ secrets.SMT_ADMIN_PASSWORD }}
          SKYLEAD_KEY: ${{ secrets.SKYLEAD_KEY }}
        run: |
          {
            echo "GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}"
            echo "GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}"
            echo "ALLOWED_DOMAIN=${ALLOWED_DOMAIN}"
            echo "ALLOWED_EMAILS=${ALLOWED_EMAILS}"
            echo "ANTHROPIC_ADMIN_API_KEY=${ANTHROPIC_ADMIN_API_KEY}"
            echo "ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}"
            echo "ANTHROPIC_AGENT_API_KEY_ID=${ANTHROPIC_AGENT_API_KEY_ID}"
            echo "HUBSPOT_TOKEN=${HUBSPOT_TOKEN}"
            echo "PORT=${PORT}"
            echo "BB_AGENTS_HOST=${BB_AGENTS_HOST}"
            echo "BB_AGENTS_DB=${BB_AGENTS_DB}"
            echo "BB_AGENTS_USER=${BB_AGENTS_USER}"
            echo "BB_AGENTS_PASSWORD=${BB_AGENTS_PASSWORD}"
            echo "PG_HOST=${PG_HOST}"
            echo "PG_PORT=5432"
            echo "PG_USER=${PG_USER}"
            echo "PG_PASSWORD=${PG_PASSWORD}"
            echo "PG_DATABASE=${PG_DATABASE}"
            echo "AGENT_SECRET=${AGENT_SECRET}"
            echo "OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}"
            echo "LAURA_AGENT_ID=laura-abhi-agent"
            echo "SMT_HOST=${SMT_HOST}"
            echo "SMT_DATABASE=${SMT_DATABASE}"
            echo "SMT_USER=${SMT_USER}"
            echo "SMT_PASSWORD=${SMT_PASSWORD}"
            echo "SMT_READONLY_USER=${SMT_READONLY_USER}"
            echo "SMT_READONLY_PASSWORD=${SMT_READONLY_PASSWORD}"
            echo "SMT_ADMIN_USER=${SMT_ADMIN_USER}"
            echo "SMT_ADMIN_PASSWORD=${SMT_ADMIN_PASSWORD}"
            echo "SKYLEAD_KEY=${SKYLEAD_KEY}"
          } > /var/www/laura-dashboard/api/.env

      - name: Install API dependencies
        run: |
          cd /var/www/laura-dashboard/api
          npm install --omit=dev --silent

      - name: Build frontend
        run: |
          cd /var/www/laura-dashboard/app
          npm install --silent
          npm run build

      - name: Copy build to web roots
        run: |
          cp -r /var/www/laura-dashboard/app/dist/* /var/www/laura-dashboard/
          mkdir -p /var/www/laura-dashboard/react-dashboard/dist
          rsync -a --delete /var/www/laura-dashboard/app/dist/ /var/www/laura-dashboard/react-dashboard/dist/

      - name: Restart API
        # A backgrounded `nohup ... &` here gets killed by the runner's own post-job orphan-process
        # cleanup regardless of disown — confirmed the hard way. The API now runs as a real systemd
        # service (laura-dashboard-api) that lives entirely outside this job's process tree, so we
        # just ask systemd to restart it. Requires the NOPASSWD sudoers rule for this exact command.
        run: |
          sudo -n systemctl restart laura-dashboard-api
          sleep 4
          curl -sf http://127.0.0.1:3100/api/health > /dev/null && echo "API healthy" || echo "WARNING: health check failed"
